<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ボランティア登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px 20px;
      line-height: 1.8;
    }

    .box {
      max-width: 420px;
      margin: auto;
    }

    .error {
      color: red;
      word-break: break-all;
    }
  </style>
</head>

<body>

<div class="box">
  <p id="message">リンクを開いています...</p>
</div>

<script>
const LIFF_ID = "2010652891-l7TP20UD";

const FORM_URL =
"https://docs.google.com/forms/d/e/1FAIpQLSc-Dc6EZRcp46qgDpE_u190RgSfEplXnCEUe-cMjazgoaNorA/viewform?usp=pp_url&entry.1497877145=USERID";

function showError(message) {
  document.getElementById("message").innerHTML =
    "<span class='error'>エラー<br><br>" +
    message +
    "</span><br><br>LINEアプリからもう一度お試しください。";
}

async function main() {
  try {

    await liff.init({
      liffId: LIFF_ID
    });

    if (!liff.isLoggedIn()) {

      liff.login({
        redirectUri: window.location.href
      });

      return;
    }

    const profile = await liff.getProfile();

    const userId = profile.userId;

    if (!userId) {
      showError("LINEユーザーIDを取得できませんでした。");
      return;
    }

    const url =
      FORM_URL.replace(
        "USERID",
        encodeURIComponent(userId)
      );

    window.location.replace(url);

  } catch (e) {

    console.error(e);

    showError(e.message);

  }
}

main();

</script>

</body>
</html>
