<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ボランティア登録</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <p id="message">
    ボランティア登録フォームを開いています…
  </p>

  <script>
    const LIFF_ID = "2010652891-I7TP20UD";

    const GOOGLE_FORM_URL =
      "https://docs.google.com/forms/d/e/1FAIpQLSc-Dc6EZRcp46qgDpE_u190RgSfEplXnCEUe-cMjazgoaNorA/viewform";

    const LINE_USER_ENTRY = "entry.1497877145";

    async function main() {
      const messageElement = document.getElementById("message");

      try {
        // LIFFを初期化
        await liff.init({
          liffId: LIFF_ID
        });

        // LINEログインしていない場合
        if (!liff.isLoggedIn()) {
          messageElement.textContent =
            "LINEログイン画面を開いています…";

          liff.login();
          return;
        }

        // LINEプロフィールを取得
        const profile = await liff.getProfile();
        const lineUserId = profile.userId;

        if (!lineUserId) {
          throw new Error(
            "LINEユーザーIDを取得できませんでした。"
          );
        }

        // LINEユーザーIDをGoogleフォームへ事前入力
        const formUrl =
          GOOGLE_FORM_URL +
          "?usp=pp_url&" +
          LINE_USER_ENTRY +
          "=" +
          encodeURIComponent(lineUserId);

        messageElement.textContent =
          "ボランティア登録フォームへ移動しています…";

        window.location.replace(formUrl);

      } catch (error) {
        console.error("LIFFエラー:", error);

        const errorMessage =
          error && error.message
            ? error.message
            : String(error);

        alert(
          "エラーが発生しました。\n\n" +
          errorMessage
        );

        messageElement.textContent =
          "フォームを開けませんでした。" +
          "公式LINEからもう一度お試しください。\n" +
          "エラー：" +
          errorMessage;
      }
    }

    main();
  </script>
</body>
</html>
